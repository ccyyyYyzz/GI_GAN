seed: 42
device: cuda
img_size: 64
dataset_root: /content/drive/MyDrive/ns_mc_gan_gi/data
output_dir: /content/drive/MyDrive/ns_mc_gan_gi/outputs_phase10_colab/rademacher10_full_noise001
dataset_name: stl10
use_augmentation: true
batch_size: 8
num_workers: 2
epochs: 60
