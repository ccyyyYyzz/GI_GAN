run_name: bayesian_witness_assimilation_dev_v1
output_dir: outputs/compatibility/bayesian_witness_assimilation/dev_v1
device: cuda
batch_size: 8
candidate_k: 16
checkpoint: E:/ns_mc_gan_gi/outputs_phase79_posterior_anti_collapse/rad5_rowspace_diversity_diagnostic/checkpoints/final.pt
reuse_existing_cache: true

context_operator:
  status: fresh_development_operator_not_locked_test
  pattern_type: rademacher
  sampling_ratio: 0.05
  noise_std: 0.0
  matrix_normalization: legacy_sqrt_m

split:
  source: STL10 train+unlabeled
  sample_count: 64
  status: fresh_development_only_not_final_not_locked

witness:
  experiment_family: bayesian_witness_assimilation_context_nullspace
  primary_selector: dm_fcc_seed3
  budgets: [1, 2, 4, 8, 16, 32]
  designs: [fixed_lowfreq, variance_adaptive, bayes_risk]
  row_pool_kind: dct2_low_frequency
  row_pool_size: 256
  row_pool_seed: 97201
  alpha_grid: [0.0, 0.25, 0.5, 1.0, 2.0]
  tau_grid: [0.05, 0.1, 0.2, 0.5, 1.0]
  conditional_audit_lambda: 1.0e-5
  risk_design_alpha: 0.0
  risk_design_tau: 0.2
  risk_design_sigma2: 1.0e-6
  redundancy_max_abs_dot: 0.995
  decision_rule: >
    Fresh-development calibration only. Alpha/tau are selected on development
    aggregate metrics and must be frozen before any future locked test.

statistics:
  bootstrap_replicates: 1000
  bootstrap_seed: 20260625
  primary_unit: image

quality:
  compute_lpips: true
  lpips_device: cuda
  focus_methods: []

gate:
  scope: fresh_development_only_not_confirmatory
  min_mean_gain: 1.0e-4
  relmeaserr_max: 1.0e-4
  decision_rule: >
    Recommend a new locked test only if a Bayesian/conditional-audit method
    beats both posterior_mean and the strongest existing same-budget witness MAP
    baseline with paired bootstrap CI upper below zero and at least min_mean_gain.

runs:
  - run_id: dev_op_seed_99051
    candidate_seed: 990700
    row_pool_seed: 990901
    context_operator:
      seed: 99051
    split:
      name: bayes_witness_dev_99051
      train_unlabeled_offset: 20000
  - run_id: dev_op_seed_99151
    candidate_seed: 991700
    row_pool_seed: 991901
    context_operator:
      seed: 99151
    split:
      name: bayes_witness_dev_99151
      train_unlabeled_offset: 21000
  - run_id: dev_op_seed_99251
