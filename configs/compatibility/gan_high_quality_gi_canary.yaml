  grad_clip: 1.0
  n_critic: 1
  lambda_charb: 20.0
  lambda_l1: 20.0
  lambda_grad: 2.0
  lambda_spec: 0.5
  lambda_adv: 0.01
  lambda_fm: 0.0
  r1_gamma: 1.0
  save_every_epochs: 1

eval:
  lpips: true
  kid_fid: true
  kid_fid_max_images: 96
  qualitative_count: 12
  bootstrap_replicates: 500
  bootstrap_seed: 20260626
  psnr_drop_tolerance_db: 0.5
  relmeaserr_limit: 1.0e-5
  lpips_relative_gain_gate: 0.05
