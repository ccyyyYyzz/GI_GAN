run_name: gan_hq_gi_64x64_5pct_canary
output_dir: outputs/compatibility/gan_high_quality_gi/canary_64_5pct
device: cuda
seed: 20260625

data:
  dataset_root: E:/ns_mc_gan_gi/data
  dataset_name: stl10
  source_split: train+unlabeled
  img_size: 64
  train_offset: 43000
  train_count: 1024
  val_offset: 44200
  val_count: 128
  dev_offset: 44400
  dev_count: 128
  batch_size: 24
  num_workers: 0

operator:
  sampling_ratio: 0.05
  total_m: 205
  dct_rows: 128
  hadamard_rows: 56
  random_rows: 20
  seed: 772001
  noise_std: 0.0
