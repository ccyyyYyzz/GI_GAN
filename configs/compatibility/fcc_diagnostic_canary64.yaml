# FCC row-null compatibility diagnostic canary (64x64), per FCC_THEORY bundle.
output_dir: E:/ns_mc_gan_gi_code_fcc_phase1/outputs/compatibility/fcc_diagnostic_canary64
device: cuda
seed: 20260627

# Data
dataset_root: E:/datasets
img_size: 64
train_count: 2048
val_count: 512
dev_count: 512
scan_start: 60000          # start scanning STL10 train+unlabeled at a high offset
download: true
project_batch_size: 64
projector_check_samples: 32
feasible_check_pairs: 256

# Fixed operator: Rademacher 5% (Rad-5 regime), m = round(0.05 * 4096) = 205
operator:
  pattern_type: rademacher
  sampling_ratio: 0.05
  matrix_normalization: legacy_sqrt_m
  noise_std: 0.0
  lambda_dc: 1.0e-3
  seed: 20260627

# Critic
embed_dim: 128
base_channels: 24
temperature: 0.07
learn_temperature: false
batch_size: 128
epochs: 20
lr: 2.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
amp: true
tiny_overfit_samples: 64
tiny_overfit_steps: 80

# Eval
donors_per_anchor: 32
recheck_feasibility: true

# Classification gate thresholds (deployable-baseline aware)
classification_thresholds:
  random_recall_mult: 4.0
  structural_auc_min: 0.70
  deployable_neutered_max: 0.60
  fcc_minus_deployable_min: 0.05
  balance_smd_max: 0.25
  label_perm_max_mult: 4.0
