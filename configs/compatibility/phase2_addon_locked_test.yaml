  - name: phase2_fixed_total_same_pool_smoke
    train_unlabeled_offset: 5120
    sample_count: 16
  - name: phase2_addon_128_dct_adaptive_rep1
    train_unlabeled_offset: 6144
    sample_count: 128
  - name: phase2_addon_128_dct_adaptive_rep2
    train_unlabeled_offset: 7168
    sample_count: 128

witness:
  experiment_family: locked_add_on_witness_dct_adaptive
  operator: fresh_rows_not_seen_by_generator
  budgets: [24, 32, 64]
  random_witness: rademacher
  random_seed: 97101
  fixed_witness: dct2_low_frequency
  adaptive_library: dct2_low_frequency
  adaptive_library_seed: 97102
  adaptive_library_size: 256
  primary_selector: dm_fcc_seed3
  compatibility_prefilter_top_m: 4

statistics:
  bootstrap_replicates: 2000
  bootstrap_seed: 97110
  primary_unit: image

quality:
  compute_lpips: true
  lpips_device: cuda

locked_test:
  status: preregistered_not_started
  scope: independent_add_on_witness_locked_test
  primary_endpoint: canonical_unclipped_p0_rmse
  primary_method: adaptive_witness_b64
  primary_budget: 64
  secondary_budgets: [24, 32]
  relmeaserr_max_threshold: 1.0e-5
  min_oracle_gain_fraction: 0.50
  one_shot: true
  final_v4_use: forbidden_for_method_selection
  fixed_total_budget_claim: excluded_from_primary_claim
  compatibility_prefilter_claim: secondary_only

classification_rules:
  success: WITNESS_ADDON_CONFIRMED
  trend: WITNESS_ADDON_TREND_ONLY
  no_benefit: WITNESS_ADDON_NO_BENEFIT
  invalid: WITNESS_EVALUATION_INVALID

pilot_gate:
  scope: locked_test_support_table_only
  primary_budget: 64
  low_budget: 24
  min_oracle_gain_fraction: 0.50
  decision_rule: >
    Support-table gate for the shared Phase 2 runner. The locked-test decision
    is made by phase2_locked_test_score_once.py using the preregistered
    locked_test section, not by the development-pilot complementarity gate.
