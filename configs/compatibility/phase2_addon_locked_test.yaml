  img_size: 64
  seed: 97051
  noise_std: 0.0
  matrix_normalization: legacy_sqrt_m

split:
  name: phase2_addon_locked_test_v1
  source: STL10 train+unlabeled
  train_unlabeled_offset: 12288
  sample_count: 512
  status: locked_test_do_not_use_for_development

development_exclusions:
  - name: phase2_fresh_operator_smoke
    train_unlabeled_offset: 4096
    sample_count: 16
  - name: phase2_fixed_total_mixed_smoke
    train_unlabeled_offset: 4608
